<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LetsJoinMe: Homepage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f9;
      color: #333;
    }
    header {
      background: #4CAF50;
      color: white;
      padding: 1rem;
      text-align: center;
    }
    nav {
      background: #333;
      display: flex;
      justify-content: center;
    }
    nav a {
      color: white;
      padding: 1rem;
      text-decoration: none;
    }
    nav a:hover {
      background: #575757;
    }
    main {
      padding: 2rem;
      text-align: center;
    }
    footer {
      background: #4CAF50;
      color: white;
      text-align: center;
      padding: 1rem;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to My Homepage</h1>
    <p>A simple, clean starting point</p>
  </header>

  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <main>
    <section id="about">
      <h2>About Me</h2>
      <p>This is a short introduction about yourself.</p>
    </section>

    <section id="projects">
      <h2>Projects</h2>
      <p>Showcase your work or hobbies here.</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>You can add your email or social links here.</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 My Homepage</p>
  </footer>
</body>
</html>
